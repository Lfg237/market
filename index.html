<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Site Commercial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
            position: relative; /* Pour positionner le hamburger */
        }
        nav {
            margin: 20px 0;
        }
        nav select {
            padding: 10px;
        }
        .product-container {
            display: flex;
            overflow-x: auto; /* Permet le défilement horizontal */
            padding: 10px;
        }
        .product {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-right: 10px; /* Espacement entre les produits */
            width: 200px;
            text-align: center;
        }
        footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        /* Hamburger menu */
        #hamburgerMenu button {
            font-size: 20px;
            padding: 8px 12px;
            cursor: pointer;
        }
        #menuContent a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>lesfacilitateurs</h1>

    <!-- Menu Hamburger -->
    <div id="hamburgerMenu" style="position:absolute; top:10px; right:10px;">
        <button onclick="toggleMenu()">☰</button>
        <div id="menuContent" style="display:none; background:#222; color:#fff; padding:10px; margin-top:5px; border-radius:5px;">
            <a href="#electromenager" style="color:white; display:block; margin:5px 0; text-decoration:none;">Électroménager</a>
            <a href="#modevetements" style="color:white; display:block; margin:5px 0; text-decoration:none;">Mode & Vêtements</a>
            <a href="#servicesocial" style="color:white; display:block; margin:5px 0; text-decoration:none;">Service Social</a>
            <a href="#espacelouer" style="color:white; display:block; margin:5px 0; text-decoration:none;">Espace à Louer</a>
        </div>
    </div>

    <nav>
        <label for="menu">Choisissez une catégorie:</label>
        <select id="menu" onchange="ouvrirLien(this.value)">
            <option value="">-- Sélectionnez --</option>
            <option value="https://www.facebook.com/profile.php?id=61578527953434">administration</option>
            <option value="https://www.facebook.com/profile.php?id=61579818028906">mode & vetements</option>
            <option value="https://www.facebook.com/profile.php?id=61579628668796">electromenager</option>
            <option value="https://www.facebook.com/profile.php?id=61577906790013">btp maconnerie generale</option>
            <option value="https://www.facebook.com/profile.php?id=61579737781145">livre & pdf </option>
            <option value="https://www.facebook.com/profile.php?id=61578527953434">community manger</option>
        </select>
    </nav>
</header>

<main>
    <h2 id="electromenager">electromenager</h2>
    <div class="product-container">
        <!-- Ton code des produits commence ici (inchangé) -->
        <div class="product">
            <h3>aksynia market</h3>
            <p>Couleur:</p>
            <select onchange="changerCouleur(this, 'Produit 1')">
                <option value="Rouge">assiette</option>
                <option value="Bleu">marmite chauffante</option>
                <option value="Vert">tv</option>
                <option value="Jaune">cuilliere</option>
                <option value="Rouge">verre</option>
                <option value="Bleu">sechoire</option>
                <option value="Vert">couteau</option>
                <option value="Jaune">micro-onde</option>
            </select>
            <button onclick="acheter('Produit 1')">Acheter</button>
        </div>
        <!-- ... (tout le reste de tes produits reste inchangé) -->
    </div>

    <h2 id="modevetements">mode & vetements</h2>
    <div class="product-container">
        <!-- Produits Mode & Vetements -->
    </div>

    <h2 id="servicesocial">service social</h2>
    <div class="product-container">
        <!-- Produits Service Social -->
    </div>

    <h2 id="espacelouer">espace a louer</h2>
    <div class="product-container">
        <!-- Produits Espace à Louer -->
    </div>
</main>

<footer>
    <p>&copy; 2025 lesfacitateurs groupe Tous droits réservés.</p>
</footer>

<script>
    function acheter(produit) {
        alert("Vous avez choisi d'acheter " + produit + ". Vous allez être redirigé vers le paiement.");
        window.location.href = "https://www.my-coolpay.com/pay/AxCnwI8R";
    }

    function changerCouleur(select, produit) {
        const couleur = select.value;
        alert("Vous avez choisi la couleur " + couleur + " pour " + produit + ".");
    }

    function ouvrirLien(lien) {
        if (lien) {
            window.location.href = lien;
        }
    }

    function toggleMenu() {
        const menu = document.getElementById('menuContent');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    }
</script>

</body>
</html>
